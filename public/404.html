<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nie znaleziono strony — pii.tools</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #101828;
      background: #f8fafc;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      max-width: 560px;
      padding: 32px;
      border: 1px solid #e4e7ec;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 18px 60px rgba(16, 24, 40, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 24px;
      color: #475467;
      line-height: 1.6;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      color: #ffffff;
      background: #155eef;
      text-decoration: none;
      font-weight: 700;
    }

    a.secondary {
      color: #155eef;
      background: #eef4ff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Nie znaleziono strony</h1>
    <p>Ten adres nie istnieje albo wskazuje na zasób, który nie jest dostępny.</p>
    <nav aria-label="Nawigacja awaryjna">
      <a href="/">Wróć do strony głównej</a>
      <a class="secondary" href="/tool">Otwórz narzędzie</a>
    </nav>
  </main>
</body>
</html>
